services:
  # MySQL Container
  db:
    image: mysql:8.0
    container_name: blogapi_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blog_db
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blogapi_network

  # Symfony (PHP) Container
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blogapi_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql://db_user:db_password@db:3306/blog_db"
      APP_ENV: dev
      APP_SECRET: your_secret_key_here
      TRUSTED_PROXIES: 127.0.0.1,127.0.0.2
      CORS_ALLOW_ORIGIN: 'http://localhost:3000'
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - "8000:80"
    networks:
      - blogapi_network
    # HIER KORRIGIERT: 'composer install' entfernt. 
    command: sh -c "php bin/console doctrine:database:create --if-not-exists && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && apache2-foreground"

  # React (Frontend) Container
  frontend:
    build:
      context: ./public/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: blogapi_frontend
    depends_on:
      - backend
    volumes:
      - ./public/frontend:/app
      # Dieses Volume verhindert, dass dein lokales (leeres) node_modules den Container überschreibt
      - /app/node_modules 
    ports:
      - "3000:3000"
    networks:
      - blogapi_network
    # HIER KORRIGIERT: 'npm install' entfernt und Vite für Aufrufe von außen geöffnet
    command: sh -c "npm run dev -- --host 0.0.0.0"

# Volumes für MySQL-Daten
volumes:
  mysql_data:

# Netzwerk für die Kommunikation zwischen Containern
networks:
  blogapi_network:
    driver: bridge